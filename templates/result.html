<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Image and Suggestions</title>
</head>
<body>
    <h1>Generated Child Image</h1>
    <img src="{{ url_for('static', filename='uploads/' + input_image.split('/')[-1]) }}" alt="Input Image" width="200">
    <br>
    <img src="{{ url_for('static', filename='generated/' + generated_image.split('/')[-1]) }}" alt="Generated Image" width="200">
    <h2>Top 3 Suggestions</h2>
    <ul>
        {% for name, similarity, image_path in top_3_matches %}
        <li>
            <img src="{{ url_for('static', filename='kid_version/' + image_path.split('/')[-1]) }}" alt="{{ name }}" width="100">
            <p>{{ name }} - Similarity: {{ similarity }}</p>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
